<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hambuger</title>
</head>
<style>
 .side-bar{
  padding: 10px;
  font-size: 20px;
  background-color: #333;
 }
 #hambuger{
  display: none;
  background-color: #333;

 }
 @media(max-width:768px){
  .side-bar{
    display: none;
  }
  #hambuger{
   display: block;
   font-size: 24px;
  }
 }
</style>
<body>
  <div class="side-bar">
    <li>Home</li>
    <li>Contact</li>
    <li>News</li>
    <li>Blog</li>
  </div>
  <button id="hambuger" onclick="hambuger()">&times;</button>
</body>

<script>
  function hambuger(){
    const sideBar = document.getElementById('side-bar');
    if(sideBar.style.display === 'block'){
      sideBar.style.display = 'none'
    }else{
      sideBar.style.display = 'block'
    }
  }
</script>
</html>
