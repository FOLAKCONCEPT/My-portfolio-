<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age calculator</title>
  <style>

    body{
      background-color: #5c0909e3;
    }
    .container{
      background-color: rgb(248, 132, 151);
      width: 300px;
      padding: 70px;
      max-width: 300px;
      margin: 100px auto;
      border-radius: 10px;
    }

    p{
      color: white;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      text-align: center;
      font-size: 18px;
    }

    input{
      width: 200px;
      height: 30px;
      margin-left: 40px;
      outline: none;
      border: none;
    }

    button{
      width: 150px;
      height: 40px;
      margin-top: 20px;
      margin-left: 65px;
      border-radius: 10px;
      border: none;
      background-color: rgba(60, 60, 116, 0.689);
      color: white;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      font-size: 16px;
    }

    #result{
      margin-top: 10px;
      color: black;
      background-color: inherit;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      }

  </style>
</head>
<body>

  <div class="container">
    <h3 style="color:rgb(195, 34, 34); text-align: center; font-size: 20px; margin-top: -16px;">Age calculator</h3>
    <p style="color:black; text-align: center; font-size: 20px;">Enter your date of birth</p>
    <form>
      <input type="date" id = 'dob' placeholder="Enter your age">

      <button type="button" onclick="calAge()">Calculate your age</button>
    </form>

    <div id = 'result'>it will show your age here</div>
  </div>

 <script>
function calAge(){

 let today = new Date();

 dob = document.getElementById('dob').value;
  let birthdate = new Date(dob)
 
  age = today.getFullYear() - birthdate.getFullYear();
  months =  today.getMonth() - birthdate.getMonth();
  days =  today.getDate() - birthdate.getDate();

  var prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);

  if(days < 0){
    months--;
    days += prevMonth.getDate();
  }

  if(months < 0){
    age--;
    months += 12;
  }

  document.getElementById('result').innerHTML = `You are ${age} years, ${months} months and ${days} days Old `;
}
  </script>
  
</body>
</html>
