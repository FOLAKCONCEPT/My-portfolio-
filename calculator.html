<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
</head>
<style>
  body{
    padding: 12px;
    margin: 25%;
    background-color: #eee;
  
     
  }

  input[type = text]{
    width: 190px;
    height: 30px;
    margin: 10px;
    border: none;
    background-color: white;
  }

  .container{
    width: 220px;
    color: white;
    background-color: rgb(153, 21, 43);
    display: flex;
    flex-direction: row;
    padding: 12px;
  }

  .container div{
    padding:2px;
    margin: 2px;

  }
  button{
    margin: 10px;
    padding: 5px;
    width: 30px;
    background-color: #eee;
    border: none;
    border-radius: 18px;
    text-align:center;

  }
  

</style>
<body>

  <div class="container">

    <form>

    <input type="text" id="display" disabled/>

<div>
  <button type="button" onclick="clearText()">C</button>
  <button type="button" onclick="append('%')" >%</button>
  <button type="button" onclick="deleteText()">X</button>
  <button type="button" onclick="append('/')" >/</button>
</div>


<div>
   <button type="button" onclick="append('7')" >7</button>
  <button type="button" onclick="append('8')">8</button>
  <button type="button" onclick="append('9')">9</button>
  <button type="button" onclick="append('*')">*</button>
</div>


<div>
   <button type="button" onclick="append('4')">4</button>
  <button type="button" onclick="append('5')">5</button>
  <button type="button" onclick="append('6')">6</button>
  <button type="button" onclick="append('-')">-</button>
</div>


<div>
   <button type="button" value="1" onclick="append(this.value)">1</button>
  <button type="button" onclick="append('2')">2</button>
  <button type="button" onclick="append('3')" >3</button>
  <button type="button" onclick="append('+')">+</button>
</div>

  
<div>
   <button type="button" onclick="append('0')">0</button>
  <button type="button" onclick="append('.')" >.</button>
  <button type="button" onclick="calcul()">=</button>
  <button type="button" onclick="append('*')" >*</button>
</div>

  </form>


  </div>
  
  <script>
function append(value){

 var display = document.getElementById('display');
 display.value += value
 //display.value += value;
}

function clearText(){
  document.getElementById('display').value = '';
}

function deleteText(){
 
  var display = document.getElementById('display');

  display.value = display.value.slice(0, -1);

  
}

function calcul(){

  var cal = document.getElementById('display').value;

  document.getElementById('display').value = eval(cal);

}
  </script>
</body>
</html>
