<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation</title>
</head>
<style>
  @keyframes change {
   /* from {
      background-color: yellow;
    } to {
      background-color: green;
    }*/
    0%{background-color: yellow;}
    25%{background-color: red;}
    50%{background-color: powderblue;}
    75%{background-color: blueviolet;}
    100%{background-color: yellowgreen;}
  }

  div{
      width: 200px;
      height: 50px;
      background-color: yellow;
      animation-name: change;
      animation-duration: 4s;
    }

    .change{
      width: 20px;
      height: 20px;
      border-radius: 30px;
      position: relative;
      animation-name: move;
      animation-duration: 0.5s;
      animation-delay: 2s;
      animation-iteration-count: infinite;
      
    }
    .change-1{

      width: 20px;
      height: 20px;
      border-radius: 30px;
      position: relative;
      animation-name: move;
      animation-duration: 0.5s;
      animation-delay: 2s;
      animation-iteration-count: infinite;
      animation-direction: reverse;
      margin: 50px;

    }

    
    @keyframes move {
      0%{background-color: red; left: 0px; top: 0px;}
      25%{background-color: yellow; left: 100px; top: 0px;}
      50%{background-color: green; left: 100px; top: 100px;}
      75%{background-color: powderblue; left: 0px; top:100px;}
      100%{background-color: brown; left: 0px; top: 0px;}
    }

</style>
<body>
  <!--<div>
    my Animation
  </div>-->

  <div class="change"></div>
  <div class="change-1"></div>
</body>
</html>
